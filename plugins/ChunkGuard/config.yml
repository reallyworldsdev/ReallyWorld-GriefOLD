# Конфигурация плагина ChunkGuard
# Позволяет ограничивать количество блоков и существ в чанках

# Настройки лимитов
limits:
  # Лимит на TNT (максимум 10 блоков в чанке)
  TNT:
    type: BLOCK  # Ограничение применяется к блокам
    max: 3      # Максимальное количество

  # Лимит на алмазные блоки (максимум 5 в чанке)
  DIAMOND_BLOCK:
    type: BLOCK
    max: 10

  # Лимит на поршни (максимум 15 в чанке)
  PISTON:
    type: BLOCK
    max: 10

  # Лимит на липкие поршни (максимум 10 в чанке)
  STICKY_PISTON:
    type: BLOCK
    max: 10

  # Лимит на редстоун (максимум 50 в чанке)
  REDSTONE_WIRE:
    type: BLOCK
    max: 30

  # Лимит на вагонетки (максимум 5 в чанке)
  MINECART:
    type: ENTITY
    max: 1

# Сообщения для игроков
messages:
  # Сообщение при превышении лимита блоков
  block_limit: "§cДостигнут лимит %block% в чанке!"

  # Сообщение при превышении лимита существ
  entity_limit: "§cДостигнут лимит %entity% в чанке!"