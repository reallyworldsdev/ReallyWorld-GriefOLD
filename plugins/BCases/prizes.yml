# Команды
# [TAKE_KEY] <key> - забрать у игрока один указанный ключ
# [PLAY] <animation> <prizes> - запустить анимацию
# [MESSAGE] <msg> - отправить игроку сообщение
# [BROADCAST] <msg> - отправить сообщение всем игрокам на сервере
# [CONSOLE] <cmd> - выполнить команду от консоли
# [GIVE] <item base64> <?min> <?max> - выдать игроку предмет. Чтобы получить предмет в виде base64 используйте команду /bcases dump
# [TITLE] <"Title\nSubTitle"> <?fadeIn> <?stay> <?fadeOut> - отправить title игроку
# [ACTION_BAR] <msg> - отправить action bar игроку

prizes:
##################
# ВСЕ ИЛИ НИЧЕГО #
##################
  allofthem: # Набор призов default
    # первый приз
    - chance: 80 
      enchanted: false
      material: stone
      give_commands:
        - '[MESSAGE] &6ꐁ'
        - '[MESSAGE] &6ꐁ &fИгрок &e%player_name% &fвыиграл &7&lНичего'
        - '[MESSAGE] &6ꐁ &fОткрыв &aВсе или ничего'
        - '[MESSAGE] &6ꐁ &fПокупка кейсов на сайте: &6furyworld.ru'
        - '[MESSAGE] &6ꐀ'
        - '[TITLE] "&7&lНичего"'
        - '[CONSOLE] title %player_name% subtitle "Ваш приз"'
      display_name: '&7&lНичего'

    - chance: 15 
      enchanted: false
      material: RED_SHULKER_BOX
      give_commands:
        - '[MESSAGE] &6ꐁ'
        - '[MESSAGE] &6ꐁ &fИгрок &e%player_name% &fвыиграл &7Набор &f&fꕗ'
        - '[MESSAGE] &6ꐁ &fОткрыв &aВсе или ничего'
        - '[MESSAGE] &6ꐁ &fПокупка кейсов на сайте: &6furyworld.ru'
        - '[MESSAGE] &6ꐀ'
        - '[CONSOLE] xkit dadmin %player_name%'
        - '[TITLE] "&7Набор &f&fꕗ"'
        - '[CONSOLE] title %player_name% subtitle "Ваш приз"'
      display_name: '&7Набор &f&fꕗ'

    - chance: 3
      enchanted: true
      material: RED_SHULKER_BOX
      give_commands:
        - '[MESSAGE] &6ꐁ'
        - '[MESSAGE] &6ꐁ &fИгрок &e%player_name% &fвыиграл &fꕗ'
        - '[MESSAGE] &6ꐁ &fОткрыв &aВсе или ничего'
        - '[MESSAGE] &6ꐁ &fПокупка кейсов на сайте: &6furyworld.ru'
        - '[MESSAGE] &6ꐀ'
        - '[CONSOLE] lp user %player_name% parent add dadmin'
        - '[TITLE] "&fꕗ"'
        - '[CONSOLE] title %player_name% subtitle "Ваш приз"'
      display_name: '&fꕗ'


