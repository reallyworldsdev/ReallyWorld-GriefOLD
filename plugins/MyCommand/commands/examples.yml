# 

grant:
  command: /grant
  type: RUN_CONSOLE
  runcmd:
  - $Script$%if%%luckperms_has_permission_grant.give%==yes
  - $text$
  - $text$ &c✕ Вы уже использовали эту возможность!
  - $text$
  - $Script$%elseif%$arg1==$player
  - $text$
  - $text$ &c✕ Нельзя выдать донат самому себе
  - $text$
  - $Script$%elseif%$arg2==mlmoder
  - lp user $arg1 parent add mlmoder
  - $text$
  - $text$ &6✔ &fВы успешно выдали &6Мл.Модер &fигроку &e$arg1
  - $text$
  - $Script$%elseif%$arg2==moder
  - lp user $arg1 parent add moder
  - $text$
  - $text$ &6✔ &fВы успешно выдали &9Модер &fигроку &e$arg1
  - $text$
  - $Script$%elseif%$arg2==moderplus
  - lp user $arg1 parent set moder+
  - $text$
  - $text$ &6✔ &fВы успешно выдали &6Модер+ &fигроку &e$arg1
  - $text$
  - $Script$%elseif%$arg2==stmoder
  - lp user $arg1 parent set stmoder
  - $text$
  - $text$ &6✔ &fВы успешно выдали &6Ст.Модер &fигроку &e$arg1
  - $text$
  - $Script$%elseif%$arg2==glmoder
  - lp user $arg1 parent set glmoder
  - $text$
  - $text$ &6✔ &fВы успешно выдали &6Гл.Поддержка &fигроку &e$arg1
  - $text$
  - $Script$%elseif%$arg2==media
  - lp user $arg1 parent add media
  - $text$
  - $text$ &6✔ &fВы успешно выдали &6Media &fигроку &e$arg1
  - $text$
  - $Script$%elseif%$arg2==mediaplus
  - lp user $arg1 parent add media+
  - $text$
  - $text$ &6✔ &fВы успешно выдали &6Media+ &fигроку &e$arg1
  - $text$
  - $Script$%elseif%$arg2==remove
  - lp user $arg1 parent remove mlmoder
  - lp user $arg1 parent remove moder
  - lp user $arg1 parent remove moder+
  - lp user $arg1 parent remove stmoder
  - lp user $arg1 parent remove glmoder
  - lp user $arg1 parent remove media
  - lp user $arg1 parent remove media+
  - $text$
  - $text$ &6✔ &fВы успешно сняли &fигрока &e$arg1
  - $text$
  permission-required: true
  permission-node: gr.giverank
  required_args: 2
  register: true
  error-message: '&6FuryWorld &7» &fИспользование: &e/grant <ник> <донат>'
  tab_completer:
    '1':
    - $player_list
    '2':
    - mlmoder
    - moder
    - moder+
    - stmoder
    - glmoder
    - media
    - media+
    - remove
